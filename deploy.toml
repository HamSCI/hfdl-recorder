[package]
name             = "hfdl-recorder"
version          = "0.1.0"
contract_version = "0.7"
license          = "MIT"

# Configuration interview (CONTRACT-v0.5 §14).  Sigmond invokes
# hfdl-recorder's own argparse subcommands; both honor the §14.3 env
# var bag (STATION_*, SIGMOND_INSTANCE, SIGMOND_RADIOD_STATUS) as
# defaults.  station_id is composed from STATION_CALL plus a
# numeric suffix derived from SIGMOND_INSTANCE for airframes.io
# registration uniqueness.
[contract.config]
init = ["/usr/local/bin/hfdl-recorder", "config", "init"]
edit = ["/usr/local/bin/hfdl-recorder", "config", "edit"]

[build]
steps = [
    "python3 -m venv /opt/git/sigmond/hfdl-recorder/venv",
    "/opt/git/sigmond/hfdl-recorder/venv/bin/pip install --upgrade pip setuptools wheel",
    "/opt/git/sigmond/hfdl-recorder/venv/bin/pip install -e /opt/git/sigmond/hfdl-recorder",
    "/opt/git/sigmond/hfdl-recorder/scripts/build-dumphfdl.sh",
]
produces = [
    "/opt/git/sigmond/hfdl-recorder/venv/bin/hfdl-recorder",
    "/opt/git/sigmond/hfdl-recorder/bin/dumphfdl",
]

[[install.steps]]
kind = "link"
src  = "/opt/git/sigmond/hfdl-recorder/venv/bin/hfdl-recorder"
dst  = "/usr/local/bin/hfdl-recorder"

[[install.steps]]
kind = "link"
src  = "systemd/hfdl-recorder@.service"
dst  = "/etc/systemd/system/hfdl-recorder@.service"

[[install.steps]]
kind     = "render"
src      = "config/hfdl-recorder-config.toml.template"
dst      = "/etc/hfdl-recorder/hfdl-recorder-config.toml"
if_absent = true

[[install.steps]]
kind = "mkdir"
dst  = "/var/lib/hfdl-recorder"
owner = "hfdlrec:hfdlrec"
mode  = "0755"

[[install.steps]]
kind = "mkdir"
dst  = "/var/log/hfdl-recorder"
owner = "hfdlrec:hfdlrec"
mode  = "0755"

[systemd]
units = []
templated_units = ["hfdl-recorder@.service"]

# CONTRACT v0.6 §17 — local sink for `hfdl.spots`.  An in-process
# tailer thread parses the JSON-per-line file dumphfdl writes at
# `/var/lib/hfdl-recorder/<radiod_id>/<band>.json` and stages parsed
# rows into sigmond's local SQLite sink (drained upstream by
# hs-uploader).  dumphfdl's optional airframes.io TCP feed (via its
# own --output spec) is unaffected — the tailer reads the local file,
# not the TCP socket.

[deps]
[[deps.binary]]
name = "dumphfdl"
note = "Built from source by scripts/build-dumphfdl.sh into /opt/git/sigmond/hfdl-recorder/bin/"

[[deps.git]]
name = "ka9q-radio"
url  = "https://github.com/ka9q/ka9q-radio.git"
note = "provides radiod IQ multicast; HFDL fragment in config/fragments/hfdl.conf"

[[deps.pypi]]
name    = "ka9q-python"
version = "3.8.0"
venv    = "/opt/git/sigmond/hfdl-recorder/venv"

# ---------------------------------------------------------------------------
# Sigmond UI hooks (drop-in registration for `smd watch` + TUI Activity).
# Consumed by lib/sigmond/client_features.py.
# ---------------------------------------------------------------------------

[client_features.watch]
verb         = "hfdl"
description  = "HFDL per-band frame counts + GS/aircraft"
verbose      = true
per_instance = true
